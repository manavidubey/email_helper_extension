<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            background: #f8fafc;
        }

        .header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .logo {
            width: 32px;
            height: 32px;
            margin-right: 12px;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            border-radius: 8px;
        }

        h1 {
            font-size: 16px;
            margin: 0;
            background: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status {
            padding: 12px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            margin-bottom: 16px;
        }

        .status-dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .online {
            background: #10b981;
        }

        .offline {
            background: #ef4444;
        }

        .footer {
            font-size: 12px;
            color: #94a3b8;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="header">
        <div class="logo"></div>
        <h1>AI Mail Assistant</h1>
    </div>
    <div class="status">
        <div id="status-text">
            <span class="status-dot online"></span> Backend Connected
        </div>
        <div style="font-size: 12px; color: #64748b; margin-top: 4px;">
            Ready to assist in Gmail
        </div>
    </div>
    <div class="footer">
        Using LiteLLM & Groq
    </div>
</body>

</html>
